<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Building in Public</title>
<meta http-equiv="refresh" content="4; url=https://libaoming.github.io/agent-design-course/">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #fffdfa; color: #1a1a19;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, sans-serif; }
  .card { max-width: 520px; padding: 40px 32px; text-align: center; }
  .dot { display: inline-block; width: 14px; height: 14px; border-radius: 4px;
    background: linear-gradient(135deg,#F59E0B,#E8651E); margin-bottom: 22px; }
  h1 { font-size: 30px; line-height: 1.3; margin: 0 0 14px; letter-spacing: -.01em; }
  h1 em { font-style: normal; background: linear-gradient(135deg,#F59E0B,#E8651E);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  p { font-size: 16px; color: #5b6370; line-height: 1.75; margin: 0 0 26px; }
  a.go { display: inline-block; padding: 12px 26px; border-radius: 999px;
    background: #C15F3C; color: #fff; text-decoration: none; font-weight: 600; font-size: 15px; }
  a.go:hover { background: #9E4A2C; }
  .hint { margin-top: 22px; font-size: 13px; color: #9a9a92; }
</style>
</head>
<body>
  <div class="card">
    <span class="dot"></span>
    <h1>我在做一门 <em>Agent 设计</em>公开课</h1>
    <p>把 Agent 学习笔记，重写成一门可讲、可查、可分享的公开课。</p>
    <a class="go" href="https://libaoming.github.io/agent-design-course/">进入 Learn Agent Design →</a>
    <p class="hint">4 秒后自动跳转…</p>
  </div>
</body>
</html>
